<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aşk Sürprizi ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #ffe6f0 0%, #ffccdd 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        .heart {
            position: fixed;
            color: #ff3366;
            font-size: 22px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
            animation: floatUp linear forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0.7;
            }
            100% {
                transform: translateY(-10vh) rotate(360deg);
                opacity: 0;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 1.8rem;
            color: #c9184a;
            margin-bottom: 2rem;
            line-height: 1.4;
        }

        .form-group {
            text-align: left;
            margin-bottom: 1.2rem;
        }

        label {
            font-weight: 600;
            color: #a13e5c;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #ffb3c6;
            border-radius: 60px;
            font-size: 1rem;
            outline: none;
            background: white;
        }

        input:focus {
            border-color: #ff4d6d;
        }

        button {
            background: #ff4d6d;
            border: none;
            padding: 14px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        .share-area {
            margin-top: 24px;
            background: #fff0f3;
            border-radius: 32px;
            padding: 1rem;
            display: none;
        }

        .share-link {
            background: white;
            padding: 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            word-break: break-all;
            color: #c9184a;
            margin: 10px 0;
            border: 1px solid #ffb3c6;
            cursor: pointer;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 12px;
        }

        .social-btn {
            padding: 10px 0;
            font-size: 0.9rem;
            width: 45%;
            margin-top: 0;
        }

        .whatsapp {
            background: #25D366;
        }

        .instagram {
            background: #d62976;
        }

        .question-buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            position: relative;
            min-height: 80px;
        }

        .yes-btn {
            background: #2b9348;
            width: 130px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .no-btn {
            background: #e63946;
            width: 130px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            cursor: pointer;
        }

        .bitis-mesaji {
            animation: pulse 0.5s ease;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 550px) {
            .container {
                padding: 1.5rem;
            }
            .question-buttons {
                gap: 15px;
            }
            .no-btn, .yes-btn {
                width: 120px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <!-- Link Oluşturma Paneli -->
    <div id="creatorPanel" class="container">
        <h1>💘 Sürpriz Hazırlık 💘</h1>
        <p style="color:#6b2e3e; margin-bottom:1.8rem;">Sevgiline "hayır" diyemeyeceği bir soru sor!</p>
        <div class="form-group">
            <label>👤 Onun ismi:</label>
            <input type="text" id="personName" placeholder="Örn: Melis, Arda" value="Aşkım">
        </div>
        <div class="form-group">
            <label>❓ Soru:</label>
            <input type="text" id="questionText" placeholder="Örn: Benimle çıkar mısın?" value="Benimle çıkar mısın?">
        </div>
        <div class="form-group">
            <label>✅ Evet cevabı:</label>
            <input type="text" id="answerText" placeholder="Mutlu cevabın" value="İşte bu yüzden sana deli oluyorum! 🎉">
        </div>
        <button id="generateLinkBtn">✨ Sihirli Link Oluştur ✨</button>
        <div id="shareBox" class="share-area">
            <div id="generatedLink" class="share-link">Link oluşacak</div>
            <div class="social-buttons">
                <button id="whatsappShareBtn" class="social-btn whatsapp">📱 WhatsApp</button>
                <button id="instagramShareBtn" class="social-btn instagram">📸 Instagram</button>
            </div>
        </div>
    </div>

    <!-- Soru Paneli -->
    <div id="questionPanel" class="container" style="display: none;">
        <h1 id="displayQuestion"></h1>
        <div class="question-buttons">
            <button id="evetButton" class="yes-btn">✅ EVET</button>
            <button id="hayirButton" class="no-btn">❌ HAYIR</button>
        </div>
    </div>

    <script>
        // Uçan kalpler
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = ['❤️', '💖', '💗', '💘'][Math.floor(Math.random() * 4)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 20 + 18) + 'px';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }
        setInterval(createHeart, 90);

        const params = new URLSearchParams(window.location.search);
        const isim = params.get('isim');
        const soru = params.get('soru');
        const cevap = params.get('cevap');

        if (isim && soru) {
            document.getElementById('creatorPanel').style.display = 'none';
            document.getElementById('questionPanel').style.display = 'block';
            document.getElementById('displayQuestion').innerHTML = `${decodeURIComponent(isim)}<br>${decodeURIComponent(soru)}`;
        }

        function buildLink() {
            let name = document.getElementById('personName').value.trim();
            let q = document.getElementById('questionText').value.trim();
            let a = document.getElementById('answerText').value.trim();
            if (name === "") name = "Aşkım";
            if (q === "") q = "Benimle çıkar mısın?";
            if (a === "") a = "Harika! Seni seviyorum ❤️";
            const base = window.location.origin + window.location.pathname;
            return `${base}?isim=${encodeURIComponent(name)}&soru=${encodeURIComponent(q)}&cevap=${encodeURIComponent(a)}`;
        }

        const genBtn = document.getElementById('generateLinkBtn');
        if (genBtn) {
            genBtn.onclick = () => {
                const link = buildLink();
                document.getElementById('generatedLink').innerText = link;
                document.getElementById('shareBox').style.display = 'block';
                navigator.clipboard.writeText(link);
            };
        }

        const waBtn = document.getElementById('whatsappShareBtn');
        if (waBtn) {
            waBtn.onclick = () => {
                const link = buildLink();
                window.open(`https://wa.me/?text=${encodeURIComponent('🎁 Sana özel sürpriz! 🎁\n' + link)}`, '_blank');
            };
        }

        const igBtn = document.getElementById('instagramShareBtn');
        if (igBtn) {
            igBtn.onclick = () => {
                const link = buildLink();
                navigator.clipboard.writeText(link);
                alert("✅ Link kopyalandı! Instagram DM veya hikayenden paylaşabilirsin.");
                window.open('https://www.instagram.com', '_blank');
            };
        }

        // KAÇAN HAYIR BUTONU
        if (isim && soru) {
            const noBtn = document.getElementById('hayirButton');
            const yesBtn = document.getElementById('evetButton');
            const container = document.querySelector('.container');
            
            noBtn.style.position = 'absolute';
            noBtn.style.transition = 'left 0.03s linear, top 0.03s linear';
            
            function setInitialPosition() {
                const yesRect = yesBtn.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                let leftPos = yesRect.right + 20;
                let topPos = yesRect.top;
                
                const maxLeft = containerRect.right - noBtn.offsetWidth - 10;
                const minLeft = containerRect.left + 10;
                const maxTop = containerRect.bottom - noBtn.offsetHeight - 10;
                const minTop = containerRect.top + 10;
                
                if (leftPos > maxLeft) leftPos = maxLeft - 10;
                if (leftPos < minLeft) leftPos = minLeft + 10;
                if (topPos > maxTop) topPos = maxTop;
                if (topPos < minTop) topPos = minTop;
                
                noBtn.style.left = leftPos + 'px';
                noBtn.style.top = topPos + 'px';
            }
            
            setTimeout(setInitialPosition, 50);
            window.addEventListener('resize', setInitialPosition);
            
            function escapeFromCursor(clientX, clientY) {
                if (!noBtn) return;
                
                const btnRect = noBtn.getBoundingClientRect();
                const btnCenterX = btnRect.left + btnRect.width / 2;
                const btnCenterY = btnRect.top + btnRect.height / 2;
                const distance = Math.hypot(clientX - btnCenterX, clientY - btnCenterY);
                
                if (distance < 100) {
                    const angle = Math.atan2(clientY - btnCenterY, clientX - btnCenterX);
                    const escapePower = Math.min(200, 120 + (100 - distance));
                    const escapeX = Math.cos(angle) * escapePower;
                    const escapeY = Math.sin(angle) * escapePower;
                    
                    let newLeft = btnRect.left - escapeX;
                    let newTop = btnRect.top - escapeY;
                    
                    const containerRect = container.getBoundingClientRect();
                    const minX = containerRect.left + 5;
                    const maxX = containerRect.right - noBtn.offsetWidth - 5;
                    const minY = containerRect.top + 5;
                    const maxY = containerRect.bottom - noBtn.offsetHeight - 5;
                    
                    newLeft = Math.min(maxX, Math.max(minX, newLeft));
                    newTop = Math.min(maxY, Math.max(minY, newTop));
                    
                    noBtn.style.left = newLeft + 'px';
                    noBtn.style.top = newTop + 'px';
                }
            }
            
            document.addEventListener('mousemove', (e) => escapeFromCursor(e.clientX, e.clientY));
            document.addEventListener('touchmove', (e) => {
                const touch = e.touches[0];
                if (touch) escapeFromCursor(touch.clientX, touch.clientY);
            });
            document.addEventListener('touchstart', (e) => {
                const touch = e.touches[0];
                if (touch) escapeFromCursor(touch.clientX, touch.clientY);
            });
            
            // Hayır butonuna tıklanırsa sadece kaç
            noBtn.addEventListener('click', (e) => {
                e.preventDefault();
                const containerRect = container.getBoundingClientRect();
                const randomLeft = containerRect.left + 10 + Math.random() * (containerRect.width - noBtn.offsetWidth - 20);
                const randomTop = containerRect.top + 10 + Math.random() * (containerRect.height - noBtn.offsetHeight - 20);
                noBtn.style.left = randomLeft + 'px';
                noBtn.style.top = randomTop + 'px';
            });
            
            // EVET BUTONU - Sadece cevabı göster, bitir. Yeni link üretme özelliği YOK!
            yesBtn.addEventListener('click', () => {
                const cevapText = decodeURIComponent(cevap);
                const panel = document.getElementById('questionPanel');
                panel.innerHTML = `
                    <div class="bitis-mesaji">
                        <h1 style="color:#2b9348; font-size: 2rem;">🎉 ${cevapText} 🎉</h1>
                        <p style="margin-top: 20px; font-size: 1.2rem; color:#c9184a;">❤️ Teşekkür ederim! ❤️</p>
                    </div>
                `;
                // Butonlar tamamen gitti, işlem bitti.
            });
        }
    </script>
</body>
</html>
